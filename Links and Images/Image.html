<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image</title>
</head>
<body>
    <img src="car.jfif" alt="car" width="500" loading="eager"><br>
    <img src="bike.jfif" alt="bike" height="200" loading="lazy"><br>
    <img src="phone.jfif" alt="phone" height="200" width="300" title="phone"><br>
    <a href="https://web.whatsapp.com/"> <img src="bike.jfif" alt=""></a><br>
    <img src="car.jfif" style="width: 200px; height: 200px; border-radius: 50%;">
    <br>
    <figure>
        <img src="bike.jfif" alt="">
        <figcaption>Bike</figcaption>
    </figure>
</body>
</html>
